<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Botones</title>
</head>
<body>
    <div class="container">
        <div class="row mt-3">
            <div class="col-12">
                <button type="button" class="btn btn-primary">Boton</button>
                <button type="button" class="btn btn-secondary">Boton</button>
                <button type="button" class="btn btn-info">Boton</button>
                <button type="button" class="btn btn-danger">Boton</button>
                <button type="button" class="btn btn-warning">Boton</button>
                <button type="button" class="btn btn-dark">Boton</button>
                <button type="button" class="btn btn-light">Boton</button>
                <button type="button" class="btn btn-success">Boton</button>
                <button type="button" class="btn btn-link">Boton</button>
            </div>
            <div class="col-12">
                <hr class="mt-3/">
                <button type="button" class="btn btn-outline-primary">Boton</button>
                <button type="button" class="btn btn-outline-secondary">Boton</button>
                <button type="button" class="btn btn-outline-info">Boton</button>
                <button type="button" class="btn btn-outline-danger">Boton</button>
                <button type="button" class="btn btn-outline-warning">Boton</button>
                <button type="button" class="btn btn-outline-dark">Boton</button>
                <button type="button" class="btn btn-outline-light">Boton</button>
                <button type="button" class="btn btn-outline-success">Boton</button>
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <button type="button" class="btn disabled btn-primary">Boton</button>
                <button type="button" class="btn disabled btn-secondary">Boton</button>
                <button type="button" class="btn disabled btn-info">Boton</button>
                <button type="button" class="btn disabled btn-danger">Boton</button>
                <button type="button" class="btn disabled btn-warning">Boton</button>
                <button type="button" class="btn disabled btn-dark">Boton</button>
                <button type="button" class="btn disabled btn-light">Boton</button>
                <button type="button" class="btn disabled btn-success">Boton</button>
                <button type="button" class="btn disabled btn-link">Boton</button>
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <a href="" class="btn btn-primary">Enlace</a>
                <button type="button" class="btn btn-primary">Boton</button>
                <button type="button" class="btn disabled btn-primary">Boton</button>
                <input type="button" class="btn btn-primary" value="Boton Input"/>
                <input type="submit" class="btn btn-primary" value="Sumbit">
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <button type="button" class="btn btn-lg btn-primary">Boton Grande</button>
                <button type="button" class="btn btn-sm btn-primary">Boton peque</button>
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <div class="d-grid gap-2 col-6">
                    <button type="button" class="btn btn-primary">Boton</button>
                    <button type="button" class="btn btn-secondary">Boton</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <div class="d-flex gap-2 justify-content-between">
                    <button type="button" class="btn btn-primary">Boton</button>
                    <button type="button" class="btn btn-secondary">Boton</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <div class="d-flex gap-2 justify-content-end">
                    <button type="button" class="btn btn-primary">Boton</button>
                    <button type="button" class="btn btn-secondary">Boton</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <div class="d-flex gap-2 justify-content-center">
                    <button type="button" class="btn btn-primary">Boton</button>
                    <button type="button" class="btn btn-secondary">Boton</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-3"/>
                <div class="d-flex gap-2 justify-content-around">
                    <button type="button" class="btn btn-primary">Boton</button>
                    <button type="button" class="btn btn-secondary">Boton</button>
                </div>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
