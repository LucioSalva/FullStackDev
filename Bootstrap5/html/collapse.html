<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Collapse</title>
</head>

<body>
    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col-6">
                <a 
                    href="#contenido1" 
                    type="button" 
                    class="btn btn-danger" 
                    data-bs-toggle="collapse"
                    aria-expanded="false" 
                    aria-controls="contenido1">
                Informacion</a>
                <div class="collapse mt-3" id="contenido1">
                    <div class="card border-danger">
                        <div class="card-body">
                            <h2 class="card-title">Titluo</h2>
                            <p class="card-text">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quasi, voluptatibus.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6">
                <button
                    type="button" 
                    class="btn btn-info" 
                    data-bs-toggle="collapse"
                    data-bs-target="#contenido2"
                    aria-expanded="false" 
                    aria-controls="contenido2">
                Informacion</button>
                <div class="collapse mt-3" id="contenido2">
                    <div class="card border-info">
                        <div class="card-body">
                            <h2 class="card-title">Titluo</h2>
                            <p class="card-text">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quasi, voluptatibus.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>

</html>
