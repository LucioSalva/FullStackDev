<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Gutters</title>
</head>
<style>
    .row{
        background: #e8e8e8;
        margin-top: 20px;        
    }
    .contenido{
        background: #f2f2f2;
        text-align: center;
        padding: 10px;      
        border: 1px solid #4d5061;
    }
</style>
<body>
    <div class="container">
        <!-- los Gutter son espacios que asigna Bootstrap en automatico estos espacios se pueden eliminar con el siguiente codigo que se
        encuentra en row -->
        <!-- Asi se establecen los Gutters por tamanos -->
        <!-- g-0 no gutters -->
        <!-- gx-5 gutter horizontal -->
        <!-- gy-5 gutter vertical -->
        <div class="row g-0">
            <div class="col-6">
                <div class="contenido">Columna 1</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 2</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 3</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 4</div>
            </div>
        </div>
        <div class="row gx-3">
            <div class="col-6">
                <div class="contenido">Columna 1</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 2</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 3</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 4</div>
            </div>
        </div>
        <div class="row gy-5">
            <div class="col-6">
                <div class="contenido">Columna 1</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 2</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 3</div>
            </div>
            <div class="col-6">
                <div class="contenido">Columna 4</div>
            </div>
        </div>
    </div>

    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
