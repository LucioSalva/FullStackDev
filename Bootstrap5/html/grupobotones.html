<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Grupo de Botones</title>
</head>
<body>
    <div class="container mt-3">
        <div class="row">
            <div class="col-12">
                <div class="btn-group" role="group" aria-label="grupo de botones">
                    <button type="button" class="btn btn-primary">boton 1</button>
                    <button type="button" class="btn btn-primary">boton 2</button>
                    <button type="button" class="btn btn-primary">boton 3</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-5">
                <div class="btn-group" role="group" aria-label="grupo de botones">
                    <button type="button" class="btn btn-outline-primary">boton 1</button>
                    <button type="button" class="btn btn-outline-info">boton 2</button>
                    <button type="button" class="btn btn-outline-dark">boton 3</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-5">
                <div class="btn-group" role="group" aria-label="grupo de botones">
                    <!-- boton activo se puede dejar por default cualquier boton activado -->
                    <button type="button" class="btn btn-outline-primary">boton 1</button>
                    <button type="button" class="btn btn-outline-info active">boton 2</button>
                    <button type="button" class="btn btn-outline-dark">boton 3</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-5">
                <div class="btn-group btn-group-sm" role="group" aria-label="grupo de botones">
                    <button type="button" class="btn btn-outline-primary active">boton 1</button>
                    <button type="button" class="btn btn-outline-info">boton 2</button>
                    <button type="button" class="btn btn-outline-dark">boton 3</button>
                </div>
                <div class="btn-group btn-group-lg" role="group" aria-label="grupo de botones">
                    <button type="button" class="btn btn-primary">boton 1</button>
                    <button type="button" class="btn btn-info">boton 2</button>
                    <button type="button" class="btn btn-dark">boton 3</button>
                </div>
                <div class="btn-group btn-group-vertical" role="group" aria-label="grupo de botones">
                    <button type="button" class="btn btn-primary">boton 1</button>
                    <button type="button" class="btn btn-info">boton 2</button>
                    <button type="button" class="btn btn-dark">boton 3</button>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-5">
                <div class="btn-group" role="group" aria-label="grupo de botones">
                    <input type="checkbox" name="check-1" id="check-1" class="btn-check">
                    <label for="check-1" class="btn btn-outline-warning">Check 1</label>

                    <input type="checkbox" name="check-2" id="check-2" class="btn-check">
                    <label for="check-2" class="btn btn-outline-danger">Check 2</label>                    

                    <input type="checkbox" name="check-3" id="check-3" class="btn-check">
                    <label for="check-3" class="btn btn-outline-success">Check 3</label>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-5">
                <div class="btn-group" role="group" aria-label="grupo de botones">
                    <input type="radio" name="radio" id="radio-1" class="btn-check">
                    <label for="radio-1" class="btn btn-outline-warning">radio 1</label>

                    <input type="radio" name="radio" id="radio-2" class="btn-check">
                    <label for="radio-2" class="btn btn-outline-danger">radio 2</label>                    

                    <input type="radio" name="radio" id="radio-3" class="btn-check">
                    <label for="radio-3" class="btn btn-outline-success">radio 3</label>
                </div>
            </div>
            <div class="col-12 mb-5">
                <hr class="mt-5">
                <div class="btn-toolbar" role="toolbar" aria-label="barra de botones">
                    <div class="btn-group" role="group" aria-label="grupo de botones">
                    <button type="button" class="btn btn-primary">Nueo</button>
                        <button type="button" class="btn btn-primary">Editar</button>
                        <button type="button" class="btn btn-primary">Guaradar</button>
                    </div>
                    <div class="btn-group" role="group" aria-label="grupo de botones">
                        <button type="button" class="btn btn-info">Izquierda</button>
                        <button type="button" class="btn btn-info">Centro</button>
                        <button type="button" class="btn btn-info">Derecha</button>
                    </div>                    
                </div>
            </div>
        </div>
    </div>

    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
