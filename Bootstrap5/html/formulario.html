<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>titulo</title>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col-6">
                <form action="">
                    <div class="mb-4">
                        <label for="correo" class="form-label">Mail</label>
                        <input type="text" class="form-control" id="correo" aria-describedby="ayudaCorreo">
                        <div id="ayudaCorreo" class="form-text">Te estaremos enviando un correo</div>
                    </div>
                    <div class="mb-4">
                        <label for="mensaje" class="form-label">Mensaje</label>
                        <textarea name="mensaje" id="mensaje" class="form-control"></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning text-light">enviar</button>
                </form>                
            </div>
            <div class="col-6">
                <form action="">
                    <input type="text" name="" id="" class="form-control form-control-lg mb-4" placeholder="Input Grande">
                    <input type="text" name="" id="" class="form-control form-control-sm mb-4" placeholder="Input peque">
                    <input type="text" name="" id="" class="form-control mb-4" placeholder="Input Deshabilitado" disabled>
                    <input type="text" name="" id="" class="form-control mb-4" placeholder="Input solo Lectura" readonly>
                    <input type="text" name="" id="" class="form-control-plaintext mb-4" placeholder="Input solo Lectura" readonly>
                    <input type="file" name="" id="" class="form-control">
                </form>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
