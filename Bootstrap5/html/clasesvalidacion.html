<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Clases de Validacion</title>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row mt-5 mb-5">
            <div class="col-6">
                <form action="">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" placeholder="Nombre" name="nombre" id="nombre"/>
                </form>
            </div>
            <div class="col-6">
                <form action="">
                    <label for="correo" class="form-label">Correo</label>
                    <input type="mail" class="form-control is-valid" placeholder="correo@correo.com" name="correo" id="correo"/>
                    <div class="valid-feedback">Correcto!</div>
                </form>
            </div>
            <div class="col-6">
                <form action="">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control is-invalid" placeholder="Nombre" name="nombre" id="nombre"/>
                    <div class="invalid-feedback">Corroeo erroneo!</div>
                </form>
            </div>
        </div>
    </div>

    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
