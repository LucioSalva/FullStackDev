<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Floatin Labels</title>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row mt-5 mb-5">
            <div class="col-6">

                <div class="form-floating mb-5">
                   <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Nombre">
                   <label for="nombre">Nombre</label>
                </div>

                <div class="form-floating mb-5">
                    <textarea name="notas" id="notas" class="form-control" placeholder="Notas"></textarea>
                    <label for="notas">Notas</label>
                </div>

                <div class="form-floating mb-5">
                    <select name="pais" id="pais" class="form-select" placeholder="selecciona">
                        <option value="">Selecciona una opcion</option>
                        <option value="mexico">Mexico</option>
                        <option value="inglaterra">Inglaterra</option>
                        <option value="canada">Canada</option>
                        <option value="noruega">Noruega</option>
                        <option value="escocia">Escocia</option>
                    </select>
                    <label for="notas">Selecciona un pais</label>
                </div>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
