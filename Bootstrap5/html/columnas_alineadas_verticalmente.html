<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Columnas Alineadas Verticalmente</title>
</head>
<style>
    .container{
        margin-top: 20px;
    }
    .row{
        background-color: rgb(153, 149, 149);
        height: 150px;
        margin: 10px 0;
        border: 1px solid black;
    }
    .columnas{
        background-color: rgb(184, 182, 182);
        text-align: center;
        border: 1px solid rgb(0, 0, 0);
        color: rgb(255, 255, 255);
        height: 50px;
    }
</style>
<body>
    <!-- para poder usar emet y poder escribir mas rapido usaremos este ejemplo .container>.row>.col*3{Columna #$} -->
    <div class="container">
        <div class="row align-items-start">
            <div class="columnas col">Columna #1</div>
            <div class="columnas col">Columna #2</div>
            <div class="columnas col">Columna #3</div>
        </div>
        <div class="row align-items-center">
            <div class="columnas col">Columna #1</div>
            <div class="columnas col">Columna #2</div>
            <div class="columnas col">Columna #3</div>
        </div>
        <div class="row align-items-end">
            <div class="columnas col">Columna #1</div>
            <div class="columnas col">Columna #2</div>
            <div class="columnas col">Columna #3</div>
        </div>
        <div class="row">
            <div class="columnas col align-self-start">Columna #1</div>
            <div class="columnas col align-self-center">Columna #2</div>
            <div class="columnas col align-self-end">Columna #3</div>
        </div>
    </div>
    

    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
