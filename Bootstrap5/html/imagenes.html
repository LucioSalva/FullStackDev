<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Imagenes</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-6">
                <img class="img-fluid" src="./img/carousel1.jpg" alt="">
            </div>
            <hr>
            <div class="col-12">
                <img class="img-fluid float-start" width="400px" src="./img/bg.jpg" alt="">
                <img class="img-fluid float-end" width="400px" src="./img/bg2.jpg" alt="">
            </div>
            <hr>
            <div class="row">
                <div class="col-12">
                    <figure class="figure">
                        <img src="./img/bg3.jpg" alt="" class="img-fluid rounded" width="400px">
                        <figcaption>
                            <div class="figure-caption">
                                <p class="text-center">Lorem ipsum dolor sit.</p>
                            </div>
                        </figcaption>
                    </figure>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
