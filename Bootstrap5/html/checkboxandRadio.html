<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>titulo</title>
</head>
<body>
    <div class="container mt-5 mb-5 bg-dark text-light">
        <div class="row">
            <!-- checkbox -->
            <div class="col-4">
                <div class="from-check">
                    <input type="checkbox" name="checkbox1" id="checkbox1" class="form-check-input">
                    <label for="checkbox1" class="form-check-label">checkbox</label>
                </div>
                <div class="from-check">
                    <input type="checkbox" name="checkbox2" id="checkbox2" class="form-check-input">
                    <label for="checkbox2" class="form-check-label">checkbox2</label>
                </div>
                <div class="from-check">
                    <input type="checkbox" name="checkbox3" id="checkbox3" class="form-check-input">
                    <label for="checkbox3" class="form-check-label">checkbox3</label>
                </div>
            </div>
            <!-- radio buttons -->
            <div class="col-4">
                <div class="from-check">
                    <input type="radio" name="buttonradio1" class="form-check-input" id="radio1" >
                    <label for="radio1" class="form-check-label">radio</label>
                </div>
                <div class="from-check">
                    <input type="radio" name="buttonradio1" class="form-check-input" id="radio2" >
                    <label for="radio2" class="form-check-label">radio2</label>
                </div>
                <div class="from-check">
                    <input type="radio" name="buttonradio1" class="form-check-input" id="radio3" >
                    <label for="radio3" class="form-check-label">radio3</label>
                </div>
                
            </div>
            <!-- switch -->
            <div class="col-4">
                <div class="from-check form-switch">
                    <input type="checkbox" name="switch1" class="form-check-input" id="switch1" >
                    <label for="switch1" class="form-check-label">Switch</label>
                </div>
                <div class="from-check form-switch">
                    <input type="checkbox" name="switch1" class="form-check-input" id="switch2" >
                    <label for="switch2" class="form-check-label">Switch2</label>
                </div>
                <div class="from-check form-switch">
                    <input type="checkbox" name="switch1" class="form-check-input" id="switch3" >
                    <label for="switch3" class="form-check-label">Switch3</label>
                </div>
                
            </div>
        </div> 

        <!-- inline -->
        <div class="row mt-5">
            <!-- checkbox -->
            <div class="col-12 mb-5">
                <div class="from-check form-check-inline">
                    <input type="checkbox" name="checkbox-1" id="checkbox-1" class="form-check-input">
                    <label for="checkbox-1" class="form-check-label">checkbox-1</label>
                </div>
                <div class="from-check form-check-inline">
                    <input type="checkbox" name="checkbox-2" id="checkbox-2" class="form-check-input">
                    <label for="checkbox-2" class="form-check-label">checkbox-2</label>
                </div>
                <div class="from-check form-check-inline">
                    <input type="checkbox" name="checkbox-3" id="checkbox-3" class="form-check-input">
                    <label for="checkbox-3" class="form-check-label">checkbox-3</label>
                </div>
            </div>
            <!-- radio buttons -->
            <div class="col-12 mb-5">
                <div class="from-check form-check-inline">
                    <input type="radio" name="buttonradio-1" class="form-check-input" id="radio-1" >
                    <label for="radio-1" class="form-check-label">radio-1</label>
                </div>
                <div class="from-check form-check-inline">
                    <input type="radio" name="buttonradio-1" class="form-check-input" id="radio-2" >
                    <label for="radio-2" class="form-check-label">radio-2</label>
                </div>
                <div class="from-check form-check-inline">
                    <input type="radio" name="buttonradio-1" class="form-check-input" id="radio-3" >
                    <label for="radio-3" class="form-check-label">radio-3</label>
                </div>
                
            </div>
            <!-- switch -->
            <div class="col-12 mb-5">
                <div class="from-check form-check-inline form-switch">
                    <input type="checkbox" name="switch-1" class="form-check-input" id="switch-1" >
                    <label for="switch-1" class="form-check-label">Switch1</label>
                </div>
                <div class="from-check form-check-inline form-switch">
                    <input type="checkbox" name="switch-1" class="form-check-input" id="switch-2" >
                    <label for="switch-2" class="form-check-label">Switch2</label>
                </div>
                <div class="from-check form-check-inline form-switch">
                    <input type="checkbox" name="switch-1" class="form-check-input" id="switch-3" >
                    <label for="switch-3" class="form-check-label">Switch3</label>
                </div>
                
            </div>
        </div>
        <div class="row mt-5 mb-5">
            <!-- checkbox estilos-->
            <div class="col-6">
                <div class="from-check">
                    <input type="checkbox" name="checkbox-button-1" id="checkbox-button-1" class="form-check-input">
                    <label for="checkbox-button-1" class="btn btn-info">checkbox-button-1</label>
                </div>
                <div class="from-check">
                    <input type="checkbox" name="checkbox-button-2" id="checkbox-button-2" class="form-check-input">
                    <label for="checkbox-button-2" class="btn btn-info">checkbox-button-2</label>
                </div>
                <div class="from-check">
                    <input type="checkbox" name="checkbox-button-3" id="checkbox-button-3" class="form-check-input">
                    <label for="checkbox-button-3" class="btn btn-info">checkbox-button-3</label>
                </div>
            </div>

            <div class="col-6">
                <div class="">
                    <input type="checkbox" name="checkbox-botn-1" id="checkbox-botn-1" class="btn-check">
                    <label for="checkbox-botn-1" class="btn btn-warning">checkbox-botn-1</label>
                </div>
                <div class="">
                    <input type="checkbox" name="checkbox-botn-2" id="checkbox-botn-2" class="btn-check">
                    <label for="checkbox-botn-2" class="btn btn-warning">checkbox-botn-2</label>
                </div>
                <div class="">
                    <input type="checkbox" name="checkbox-botn-3" id="checkbox-botn-3" class="btn-check">
                    <label for="checkbox-botn-3" class="btn btn-warning">checkbox-botn-3</label>
                </div>
            </div>

            <div class="col-6 mt-5 mb-5">       
                    <!-- para checkbox paralelos y sin el check -->
                    <input type="checkbox" name="checkbox-butn-1" id="checkbox-butn-1" class="btn-check">
                    <label for="checkbox-butn-1" class="btn btn-danger">checkbox-butn-1</label>                               
                    <input type="checkbox" name="checkbox-butn-2" id="checkbox-butn-2" class="btn-check">
                    <label for="checkbox-butn-2" class="btn btn-danger">checkbox-butn-2</label>                                
                    <input type="checkbox" name="checkbox-butn-3" id="checkbox-butn-3" class="btn-check" disabled>
                    <label for="checkbox-butn-3" class="btn btn-danger">checkbox-butn-3</label>                
            </div>

            <!-- radio buttons -->
            <div class="col-6 mt-5">       
                <!-- para radio paralelos y sin el check -->
                <input type="radio" name="radio-butn" id="radio-butn-1" class="btn-check">
                <label for="radio-butn-1" class="btn btn-success">radio-butn-1</label>                               
                <input type="radio" name="radio-butn" id="radio-butn-2" class="btn-check">
                <label for="radio-butn-2" class="btn btn-success">radio-butn-2</label>                                
                <input type="radio" name="radio-butn" id="radio-butn-3" class="btn-check">
                <label for="radio-butn-3" class="btn btn-success">radio-butn-3</label>                
        </div>

        </div>    
    </div>


    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
