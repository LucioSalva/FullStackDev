<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Selectbox</title>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col">
                <select name="pais" id="pais" class="form-select mb-3" aria-label="seleccion de pais">
                    <option value="mexico">Mexico</option>
                    <option value="guatemala">Gautemala</option>
                    <option value="argentina">Argentina</option>
                    <option value="chile">Chile</option>
                    <option value="urugay">Urugay</option>
                </select>
                <select name="pais" id="pais" class="form-select form-select-lg mb-3" aria-label="seleccion de pais">
                    <option value="mexico">Mexico</option>
                    <option value="guatemala">Gautemala</option>
                    <option value="argentina">Argentina</option>
                    <option value="chile">Chile</option>
                    <option value="urugay">Urugay</option>
                </select>
                <select name="pais" id="pais" class="form-select form-select-sm mb-3" aria-label="seleccion de pais">
                    <option value="mexico">Mexico</option>
                    <option value="guatemala">Gautemala</option>
                    <option value="argentina">Argentina</option>
                    <option value="chile">Chile</option>
                    <option value="urugay">Urugay</option>
                </select>
                <select multiple size="2" name="pais" id="pais" class="form-select mb-3" aria-label="seleccion de pais">
                    <option value="mexico">Mexico</option>
                    <option value="guatemala">Gautemala</option>
                    <option value="argentina">Argentina</option>
                    <option value="chile">Chile</option>
                    <option value="urugay">Urugay</option>
                </select>
                <select disabled name="pais" id="pais" class="form-select mb-3" aria-label="seleccion de pais">
                    <option value="mexico">Mexico</option>
                    <option value="guatemala">Gautemala</option>
                    <option value="argentina">Argentina</option>
                    <option value="chile">Chile</option>
                    <option value="urugay">Urugay</option>
                </select>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
