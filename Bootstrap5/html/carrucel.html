<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Carrucel</title>
</head>
<body>
    <div class="container mt-5">

        <div class="row">
            <div class="col-12">
                <div class="carousel slide" id="miCarrusel" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="./img/carousel1.jpg" alt="" class="img-fluid">
                        </div>
                        <div class="carousel-item">
                            <div class="carousel-caption">
                                <h5>Titulo El que sea</h5>
                                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Sit, aperiam.</p>

                        </div>
                        <div class="carousel-item">
                            <img src="./img/carousel3.jpg" alt="" class="img-fluid">
                        </div>
                    </div>

                    <!-- Controles -->
                    <button class="carousel-control-prev" type="button" data-bs-target="#miCarrusel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Anetrior</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#miCarrusel" data-bs-slide="next">

                        <span class="visually-hidden">Siguiente</span>
                    </button>

                    <!-- indicadores -->
                    <div class="carousel-indicators">
                        <button type="button" class="active" data-bs-slide-to="0" data-bs-target="#miCarrusel" aria-label="Slaide1"></button>
                        <button type="button" class="" data-bs-slide-to="1" data-bs-target="#miCarrusel" aria-label="Slaide2"></button>
                        <button type="button" class="" data-bs-slide-to="2" data-bs-target="#miCarrusel" aria-label="Slaide3"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">

            <div class="col-12">

                        <div class="carousel-item active" data-bs-interval="1000">
