<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.min.css">
    <link rel="stylesheet" href="/Bootstrap5/css/bootstrap.css">
    <title>Columnas Anidadas</title>
</head>
<style>
    .container{
        margin-top: 20px;
        background-color: black;
    }
    .row{
        background-color: yellowgreen;
    }
    .columnas{
        background-color: purple;
        text-align: center;
        border: 1px solid silver;
        color: orangered;
    }
    .columnasI{
        background-color: slateblue;
        text-align: center;
        border: 1px solid tomato;
        color: white;
    }
</style>
<body>
    <div class="container">
        <div class="row">
            <div class="columnas col-12 col-md-6">
                Columna #1
                <div class="row">
                    <div class="columnasI col-12 col-md-6">Columna Interior #1</div>
                    <div class="columnasI col-12 col-md-6">Columna Interior #2</div>
                </div>
            </div>
            <div class="columnas col-12 col-md-6">
                Columna #2
                <div class="row">
                    <div class="columnasI col-12 col-md-6">Columna Interior #1</div>
                    <div class="columnasI col-12 col-md-6">Columna Interior #2</div>
                </div>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/js/bootstrap.bundle.min.js"></script>
</body>
</html>
