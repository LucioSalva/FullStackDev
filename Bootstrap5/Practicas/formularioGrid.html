<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/Practicas/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/Practicas/css/bootstrap.css">
    <title>Formulario con Grid</title>
</head>
<body>
    <div class="container mt-5 mb-5" style="background-color: lightslategrey;">
        <div class="row mt-5 mb-5">
            <div class="col">
                <form action="">
                    <div class="row">
                        <div class="col-sm-12 col-md-6 mb-5">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Tu Nombre">
                        </div>
                        <div class="col-sm-12 col-md-6 mb-5">
                            <label for="mail" class="form-label">Mail</label>
                            <input type="email" name="mail" id="mail" class="form-control" placeholder="Eje: correo@correo.com">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12 col-md-6 mb-3">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea name="mensaje" id="mensaje" class="form-control"></textarea>
                        </div>
                        <div class="col-sm-12 col-md-6">
                            <div class="row">
                                <div class="col-sm-12 col-md-6 ">
                                    <label for="" class="form-label">Estado Civil</label>
                                    
                                    <div class="form-check">
                                        <input type="radio" class="form-check-input" name="estadoCivil" id="Soltero">
                                        <label for="Soltero" class="form-check-label">Soltero(a)</label>
                                    </div>
                                    <div class="form-check">
                                        <input type="radio" class="form-check-input" name="estadoCivil" id="Casado">
                                        <label for="Casado" class="form-check-label">Casado(a)</label>
                                    </div>
                                    <div class="form-check">
                                        <input type="radio" class="form-check-input" name="estadoCivil" id="Divorciado">
                                        <label for="Divorciado" class="form-check-label">Divorciado(a)</label>
                                    </div>
                                    <div class="form-check">
                                        <input type="radio" class="form-check-input" name="estadoCivil" id="Viudo">
                                        <label for="Viudo" class="form-check-label">Viudo(a)</label>
                                    </div>
                                </div>
                                <div class="col-sm-12 col-md-6">
                                    <label for="" class="form-label">Pais</label>
                                    <select name="Pais" id="Pais" class="form-select">
                                        <option value="mexico">Mexico</option>
                                        <option value="escocia">Escocia</option>
                                        <option value="argentina">Argentina</option>
                                        <option value="canada">Canada</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12 d-flex justify-content-center">
                            <div>
                                <div class="form-check mb-2 mt-5">
                                    <input type="checkbox" name="terminos" id="terminos" class="form-check-input"/>
                                    <label for="terminos" class="form-check-label">Acepto terminos y condiciones</label>
                                </div>
                                <button type="submit" class="col-12 btn btn-success mb-4 mt-1">Enviar</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/Practicas/js/bootstrap.bundle.min.js"></script>
</body>
</html>
