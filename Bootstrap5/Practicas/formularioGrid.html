<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Bootstrap5/Practicas/css/bootstrap.min.css">
    <link rel="sty  lesheet" href="/Bootstrap5/Practicas/css/bootstrap.css">
    <title>Formulario con Grid</title>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row mt-5 mb-5">
            <div class="col">
                <form action="">
                    <div class="row">
                        <div class="col-sm-12 col-md-6 mb-5">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Tu Nombre">
                        </div>
                        <div class="col-sm-12 col-md-6 mb-5">
                            <label for="mail" class="form-label">Mail</label>
                            <input type="email" name="mail" id="mail" class="form-control" placeholder="Eje: correo@correo.com">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12  col-md-6">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea name="mensaje" id="mensaje" class="form-control"></textarea>
                        </div>
                        <div class="col-sm-12 col-md-6">
                            <div class="row">
                                <div class="col-sm-12 col-md-6">
                                    <label for="" class="form-label">Estado Civil</label>
                                    
                                </div>
                                <div class="col-sm-12 col-md-6">
                                    <label for="" class="form-label">Pais</label>

                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="/Bootstrap5/Practicas/js/bootstrap.bundle.min.js"></script>
</body>
</html>
